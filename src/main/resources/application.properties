spring.application.name=mhv

# ===============================
# JWT & SECURITY
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000,http://192.168.*.*:*,https://*.ngrok-free.dev,https://*.ngrok-free.app,https://*.vercel.app,https://mhv-5wgsdgk92-minhtvpy00202-gits-projects.vercel.app,https://mhv.vercel.app

# ===============================
# POSTGRESQL DATABASE
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# ===============================
# HIBERNATE
# ===============================
# Auto create/update tables for empty PostgreSQL DB
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jackson.time-zone=UTC
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:10000}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_ORG_HIBERNATE_SQL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${LOGGING_LEVEL_ORG_HIBERNATE_ORM_JDBC_BIND:WARN}
app.performance.slow-request-threshold-ms=${APP_PERFORMANCE_SLOW_REQUEST_THRESHOLD_MS:1500}

# ===============================
# SERVER COMPRESSION
# ===============================
server.compression.enabled=true
server.compression.mime-types=application/json,text/plain,text/html,text/css,application/javascript,application/xml,text/xml
server.compression.min-response-size=1024
server.forward-headers-strategy=framework

# ===============================
# FILE / OBJECT STORAGE
# ===============================
app.storage.provider=${APP_STORAGE_PROVIDER:local}
app.upload-dir=${APP_UPLOAD_DIR:uploads}
app.spaces.bucket=${APP_SPACES_BUCKET:}
app.spaces.region=${APP_SPACES_REGION:}
app.spaces.endpoint=${APP_SPACES_ENDPOINT:}
app.spaces.access-key=${APP_SPACES_ACCESS_KEY:}
app.spaces.secret-key=${APP_SPACES_SECRET_KEY:}
app.spaces.public-base-url=${APP_SPACES_PUBLIC_BASE_URL:}

# ===============================
# ONE-OFF CLEANUP: LEGACY TICKET IMAGE URL
# Keep disabled in normal runs. Enable manually only when cleaning old image_url data.
# ===============================
app.cleanup.ticket-image-url.enabled=false
app.cleanup.ticket-image-url.dry-run=true
app.cleanup.ticket-image-url.log-limit=20

# ===============================
# DEMO DATA SEEDING
# Production should keep this off. Enable locally with APP_SEED_DEMO_USERS_ENABLED=true when needed.
# ===============================
app.seed.demo-users.enabled=${APP_SEED_DEMO_USERS_ENABLED:false}

# ===============================
# OPENAPI / SWAGGER
# Keep internal Spring paths standard; DigitalOcean may expose them under /api externally.
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=../v3/api-docs/swagger-config
springdoc.swagger-ui.url=../v3/api-docs
springdoc.swagger-ui.oauth2-redirect-url=oauth2-redirect.html
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
