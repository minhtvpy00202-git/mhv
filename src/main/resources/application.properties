spring.application.name=mhv

# ===============================
# JWT & SECURITY
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000,http://192.168.*.*:*,https://*.ngrok-free.dev,https://*.ngrok-free.app,https://*.vercel.app,https://mhv-5wgsdgk92-minhtvpy00202-gits-projects.vercel.app,https://mhv.vercel.app

# ===============================
# AZURE SQL DATABASE
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.microsoft.sqlserver.jdbc.SQLServerDriver}

# ===============================
# HIBERNATE
# ===============================
# Auto create/update tables for empty Azure DB
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SERVER COMPRESSION
# ===============================
server.compression.enabled=true
server.compression.mime-types=application/json,text/plain,text/html,text/css,application/javascript,application/xml,text/xml
server.compression.min-response-size=1024

# ===============================
# FILE UPLOAD
# ===============================
app.upload-dir=uploads

# ===============================
# OPENAPI / SWAGGER
# ===============================
springdoc.api-docs.path=/api/v3/api-docs
springdoc.swagger-ui.path=/api/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
